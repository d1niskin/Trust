<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritas | Система обработки обращений</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 antialiased min-h-screen">

    <div id="login-screen" class="flex items-center justify-center min-h-screen bg-zinc-950 relative overflow-hidden">
        <!-- Декоративный круг в стиле ЦУ -->
        <div class="absolute w-[500px] h-[500px] bg-[#ffdd2b] rounded-full blur-[150px] opacity-10 top-0 left-1/2 -translate-x-1/2"></div>
        
        <div class="bg-zinc-900 border border-zinc-800 p-10 rounded-3xl shadow-2xl w-96 text-center relative z-10">
            <h2 class="text-3xl font-black mb-2 text-white uppercase tracking-tight">Veritas</h2>
            <p class="text-sm text-zinc-400 mb-8 font-medium">Вход для сотрудников</p>
            <input type="password" id="admin-password" placeholder="Пароль доступа" class="w-full bg-zinc-950 border-2 border-zinc-800 p-4 rounded-xl mb-6 focus:border-[#ffdd2b] text-white outline-none transition-colors font-medium text-center tracking-widest">
            <button onclick="login()" class="w-full bg-[#ffdd2b] text-zinc-950 font-bold py-4 rounded-xl hover:bg-[#f0c800] transition duration-200 text-lg">Войти</button>
            <p id="login-error" class="text-red-400 text-sm mt-4 hidden font-semibold">Доступ запрещен</p>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden flex flex-col min-h-screen">
        <header class="bg-zinc-950 border-b border-zinc-800 p-6 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-4">
                <div class="w-3 h-3 bg-[#ffdd2b] rounded-full animate-pulse"></div>
                <h1 class="text-xl font-black uppercase tracking-tight text-white">Veritas <span class="text-zinc-500 font-medium ml-2 text-sm normal-case">| Система обработки обращений</span></h1>
            </div>
            <button onclick="logout()" class="text-sm font-bold bg-zinc-800 px-5 py-2.5 rounded-lg hover:bg-zinc-700 text-white transition">Выйти</button>
        </header>

        <main class="p-8 max-w-[1400px] mx-auto w-full flex-grow">
            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-zinc-950 text-zinc-400 text-xs font-bold uppercase tracking-wider">
                            <th class="p-5 border-b border-zinc-800 w-1/6">ID / Дата</th>
                            <th class="p-5 border-b border-zinc-800 w-1/6">Категория</th>
                            <th class="p-5 border-b border-zinc-800 w-1/2">Обращения</th>
                            <th class="p-5 border-b border-zinc-800 w-1/12">Статус</th>
                            <th class="p-5 border-b border-zinc-800 w-1/12">Изменение статуса</th>
                        </tr>
                    </thead>
                    <tbody id="tickets-table" class="text-sm">
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "/api";
        let currentKey = "";

        async function login() {
            const pwd = document.getElementById('admin-password').value;
            try {
                const res = await fetch(`${API_URL}/admin/tickets`, { headers: { 'admin-key': pwd } });
                if (res.ok) {
                    currentKey = pwd;
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('dashboard-screen').classList.remove('hidden');
                    loadTickets();
                } else { 
                    document.getElementById('login-error').classList.remove('hidden'); 
                }
            } catch (e) { alert("Сервер недоступен."); }
        }

        async function loadTickets() {
            let savedInputs = {};
            document.querySelectorAll('input[id^="reply-input-"]').forEach(input => {
                if (input.value) savedInputs[input.id] = input.value;
            });

            const res = await fetch(`${API_URL}/admin/tickets`, { headers: { 'admin-key': currentKey } });
            const tickets = await res.json();
            const tbody = document.getElementById('tickets-table');
            tbody.innerHTML = "";

            tickets.forEach(t => {
                const date = new Date(t.created_at).toLocaleString('ru');
                
                // Строгие стили для статусов
                let statusColor = t.status === "Новое" ? "bg-red-500/10 text-red-400 border border-red-500/20" : 
                                  t.status === "В работе" ? "bg-[#ffdd2b]/10 text-[#ffdd2b] border border-[#ffdd2b]/20" : 
                                  "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
                
                let mainFileHtml = t.file_url ? `<div class="mt-3"><a href="${t.file_url}" target="_blank" class="text-[#ffdd2b] hover:text-[#f0c800] underline decoration-2 underline-offset-2 text-xs font-bold">[Вложение жалобы]</a></div>` : '';

                let chatHtml = t.messages.map(m => {
                    let fileHtml = m.file_url ? `<br><a href="${m.file_url}" target="_blank" class="text-current underline decoration-2 underline-offset-2 text-xs mt-1 inline-block font-bold">[Прикрепленный файл]</a>` : '';
                    let delBtn = m.sender === 'Офицер' ? `<button onclick="deleteMsg(${m.id})" class="text-red-400 hover:text-red-300 font-bold text-xs ml-3">[удалить]</button>` : '';
                    
                    let bubbleClass = m.sender === 'Офицер' ? 
                        'bg-[#ffdd2b] text-zinc-950 ml-4 font-medium' : 
                        'bg-zinc-800 text-zinc-100 mr-4 font-medium';

                    return `
                    <div class="mb-2 text-sm p-3 rounded-2xl ${bubbleClass}">
                        <span class="text-[10px] font-black uppercase tracking-wider opacity-60 block mb-1">${m.sender}</span>
                        ${m.text} ${fileHtml} ${delBtn}
                    </div>`;
                }).join('');

                if (t.messages.length === 0) chatHtml = '<div class="text-xs text-zinc-500 font-medium text-center py-4">Переписка отсутствует</div>';

                tbody.innerHTML += `
                    <tr class="hover:bg-zinc-800/50 border-b border-zinc-800 transition-colors">
                        <td class="p-5 align-top">
                            <strong class="text-white text-base tracking-wide">${t.ticket_number}</strong><br>
                            <span class="text-xs text-zinc-500 font-medium mt-1 inline-block">${date}</span>
                        </td>
                        <td class="p-5 align-top font-semibold text-zinc-300">${t.category}</td>
                        <td class="p-5 align-top">
                            <div class="text-zinc-300 mb-4 bg-zinc-950 p-4 rounded-2xl border border-zinc-800">
                                <b class="block mb-2 text-xs text-zinc-500 uppercase tracking-wider">Текст обращения:</b> 
                                <span class="font-medium leading-relaxed">${t.description}</span>
                                ${mainFileHtml}
                            </div>
                            
                            <div class="chat-container max-h-48 overflow-y-auto mb-3 pr-2 custom-scrollbar" id="chat-${t.ticket_number}">${chatHtml}</div>
                            
                            <div class="flex flex-col gap-3 border-t border-zinc-800 pt-4 mt-2">
                                <div class="flex items-center gap-3">
                                    <input type="file" id="reply-file-${t.ticket_number}" class="text-xs text-zinc-400 file:mr-4 file:py-1 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-zinc-800 file:text-zinc-200 hover:file:bg-zinc-700 transition-colors cursor-pointer w-full">
                                </div>
                                <div class="flex gap-2">
                                    <input type="text" id="reply-input-${t.ticket_number}" placeholder="Текст сообщения..." class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm w-full outline-none focus:border-[#ffdd2b] text-white font-medium transition-colors">
                                    <button onclick="sendReply('${t.ticket_number}')" class="bg-[#ffdd2b] text-zinc-950 px-5 py-2 rounded-xl text-sm font-bold hover:bg-[#f0c800] transition">Отправить</button>
                                </div>
                            </div>
                        </td>
                        <td class="p-5 align-top"><span class="px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest ${statusColor}">${t.status}</span></td>
                        <td class="p-5 align-top">
                            <select onchange="updateStatus('${t.ticket_number}', this.value)" class="bg-zinc-950 border border-zinc-800 rounded-xl p-2.5 text-xs font-semibold outline-none focus:border-[#ffdd2b] w-full text-zinc-200 transition-colors cursor-pointer">
                                <option value="" disabled selected>Статус...</option>
                                <option value="Новое" ${t.status === 'Новое' ? 'selected' : ''}>Новое</option>
                                <option value="В работе" ${t.status === 'В работе' ? 'selected' : ''}>В работу</option>
                                <option value="Закрыто" ${t.status === 'Закрыто' ? 'selected' : ''}>Закрыть</option>
                            </select>
                        </td>
                    </tr>
                `;
            });

            for (let id in savedInputs) {
                let input = document.getElementById(id);
                if (input) input.value = savedInputs[id];
            }
        }

        async function updateStatus(num, status) {
            await fetch(`${API_URL}/admin/tickets/${num}/status`, {
                method: 'PATCH', headers: { 'admin-key': currentKey, 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            loadTickets();
        }

        async function sendReply(num) {
            const input = document.getElementById(`reply-input-${num}`);
            const fileInput = document.getElementById(`reply-file-${num}`);
            
            if (!input.value.trim() && (!fileInput.files || fileInput.files.length === 0)) return;

            const formData = new FormData();
            formData.append('message', input.value);
            if (fileInput.files[0]) formData.append('file', fileInput.files[0]);

            await fetch(`${API_URL}/admin/tickets/${num}/message`, {
                method: 'POST', headers: { 'admin-key': currentKey }, body: formData
            });
            loadTickets();
        }

        async function deleteMsg(id) {
            if(!confirm("Удалить сообщение?")) return;
            await fetch(`${API_URL}/admin/messages/${id}`, { method: 'DELETE', headers: { 'admin-key': currentKey } });
            loadTickets();
        }

        function logout() { location.reload(); }

        setInterval(() => {
            if(currentKey && !document.getElementById('dashboard-screen').classList.contains('hidden')) {
                loadTickets();
            }
        }, 2000);
    </script>
</body>
</html>
